name: Build Hybris Boot Image

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'fajita'
      release:
        description: 'SailfishOS release version'
        required: true
        default: '5.0.0.73'
  push:
    branches: [ main, master ]
    paths:
      - 'fajita-sfos-ci/**'
      - '.github/workflows/build-hybris-boot.yml'
      - '.github/workflows/main.yml'
      - 'scripts/clean-kernel-drivers.sh'

env:
  DEVICE: ${{ github.event.inputs.device || 'fajita' }}
  RELEASE: ${{ github.event.inputs.release || '5.0.0.73' }}
  ANDROID_ROOT: /home/runner/work/android
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-hybris-boot:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          curl \
          unzip \
          build-essential \
          ccache \
          python3 \
          python3-pip \
          openjdk-8-jdk \
          rsync \
          bc \
          bison \
          flex \
          lib32ncurses-dev \
          lib32z1-dev \
          libssl-dev \
          libxml2-utils \
          xsltproc \
          zip \
          gcc-12-aarch64-linux-gnu \
          g++-12-aarch64-linux-gnu \
          gcc-12-arm-linux-gnueabihf \
          g++-12-arm-linux-gnueabihf

    - name: Cache kernel build
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          /home/runner/work/android/kernel
        key: kernel-${{ env.DEVICE }}-${{ github.sha }}
        restore-keys: |
          kernel-${{ env.DEVICE }}-

    - name: Clone kernel source
      env:
        GIT_TERMINAL_PROMPT: 0
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p $ANDROID_ROOT
        cd $ANDROID_ROOT

        # Configure git to avoid interactive prompts
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"

        # Setup git credential helper for GitHub
        git config --global credential.helper store
        echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > ~/.git-credentials

        # Clone only the kernel (much smaller than full Android source)
        git clone --depth 1 --single-branch --branch lineage-16.0 \
          https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git \
          kernel/oneplus/sdm845

    - name: Apply kernel patches for Docker support
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # List available defconfigs
        echo "Available defconfigs:"
        ls arch/arm64/configs/*_defconfig

        # Find the correct defconfig for fajita
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Using defconfig: $DEFCONFIG"

        # Backup original config
        cp arch/arm64/configs/$DEFCONFIG arch/arm64/configs/$DEFCONFIG.bak

        # Add Docker kernel options v2 - 基于一加6T实际检查结果
        cat >> arch/arm64/configs/$DEFCONFIG << 'EOF'

        # Docker support v2 - 基于一加6T实际检查结果

        # Generally Necessary - 网络过滤
        CONFIG_BRIDGE_NETFILTER=y
        CONFIG_IP6_NF_TARGET_MASQUERADE=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_MATCH_IPVS=y

        # Generally Necessary - 其他
        CONFIG_POSIX_MQUEUE=y
        CONFIG_IP6_NF_NAT=y

        # Optional Features - 存储和IO
        CONFIG_CFQ_GROUP_IOSCHED=y
        CONFIG_BLK_CGROUP=y
        CONFIG_BLK_DEV_THROTTLING=y

        # Optional Features - Cgroups
        CONFIG_CGROUP_PERF=y
        CONFIG_CGROUP_HUGETLB=y
        CONFIG_CGROUP_NET_PRIO=y
        CONFIG_CFS_BANDWIDTH=y

        # Optional Features - 安全
        CONFIG_SECURITY_APPARMOR=y

        # Optional Features - 文件系统
        CONFIG_EXT4_FS_POSIX_ACL=y

        # Optional Features - 网络驱动
        CONFIG_VXLAN=y
        CONFIG_BRIDGE_VLAN_FILTERING=y
        CONFIG_IPVLAN=y
        CONFIG_DUMMY=y

        # Optional Features - 存储驱动
        CONFIG_BTRFS_FS=y
        CONFIG_BTRFS_FS_POSIX_ACL=y

        # 禁用 EFI stub 避免链接错误
        CONFIG_EFI=n
        CONFIG_EFI_STUB=n
        EOF

        # Show added config
        tail -50 arch/arm64/configs/$DEFCONFIG

    - name: Build kernel
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Create symlinks for cross-compilers
        sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc
        sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-12 /usr/bin/aarch64-linux-gnu-g++

        # Setup build environment using Ubuntu cross-compilers
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=aarch64-linux-gnu-gcc
        export PATH=/usr/bin:$PATH

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Building with defconfig: $DEFCONFIG"

        # Build kernel
        make $DEFCONFIG

        # Clean problematic drivers
        bash $GITHUB_WORKSPACE/scripts/clean-kernel-drivers.sh $ANDROID_ROOT/kernel/oneplus/sdm845

        # Additional Kconfig cleanup
        sed -i '/source "drivers\/media\/platform\/msm\/vidc\/Kconfig"/d' drivers/media/platform/msm/Kconfig || true
        sed -i '/source "drivers\/esoc\/Kconfig"/d' drivers/Kconfig || true
        sed -i '/source "net\/ipc_router\/Kconfig"/d' net/Kconfig || true

        # Build kernel only (skip device tree to avoid interposer errors)
        make -j$(nproc) Image.gz

        # Check if kernel image was built
        if [ ! -f arch/arm64/boot/Image.gz ]; then
          echo "Error: Kernel image not found"
          exit 1
        fi

        ls -lh arch/arm64/boot/Image.gz

    - name: Create boot image
      run: |
        cd $ANDROID_ROOT

        # Create output directory
        mkdir -p output

        # Copy kernel image
        cp kernel/oneplus/sdm845/arch/arm64/boot/Image.gz output/

        # Note: For a complete boot image, you would need:
        # - Original boot.img from device
        # - mkbootimg tool to repack
        # This is a simplified version that just builds the kernel

        echo "Kernel image extracted to output/Image.gz-dtb"
        ls -lh output/

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.DEVICE }}-${{ env.RELEASE }}
        path: output/Image.gz
        retention-days: 30

    - name: Upload kernel config
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        # Copy config to output
        mkdir -p $ANDROID_ROOT/output
        cp arch/arm64/configs/$DEFCONFIG $ANDROID_ROOT/output/kernel.config

    - name: Upload kernel config artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-config-${{ env.DEVICE }}
        path: ${{ env.ANDROID_ROOT }}/output/kernel.config
        retention-days: 30

    - name: Generate build summary
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          DEFCONFIG="unknown"
        fi

        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Device**: ${{ env.DEVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release**: ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel**: sdm845" >> $GITHUB_STEP_SUMMARY
        echo "- **Defconfig**: $DEFCONFIG" >> $GITHUB_STEP_SUMMARY
        echo "- **Docker Support**: Enabled" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Image.gz-dtb (kernel image)" >> $GITHUB_STEP_SUMMARY
        echo "- kernel config" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Note" >> $GITHUB_STEP_SUMMARY
        echo "This workflow builds only the kernel. To create a complete boot.img," >> $GITHUB_STEP_SUMMARY
        echo "you need to repack it with mkbootimg using the original boot image from your device." >> $GITHUB_STEP_SUMMARY
