name: Build Hybris Boot Image

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'fajita'
      release:
        description: 'SailfishOS release version'
        required: true
        default: '5.0.0.73'
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/build-hybris-boot.yml'
      - 'scripts/apply-docker-kernel-patch-v2.sh'
      - 'scripts/clean-kernel-drivers.sh'

env:
  DEVICE: ${{ github.event.inputs.device || 'fajita' }}
  RELEASE: ${{ github.event.inputs.release || '5.0.0.73' }}
  ANDROID_ROOT: /home/runner/work/android
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-hybris-boot:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          curl \
          unzip \
          build-essential \
          ccache \
          python3 \
          python3-pip \
          openjdk-8-jdk \
          rsync \
          bc \
          bison \
          flex \
          lib32ncurses-dev \
          lib32z1-dev \
          libssl-dev \
          libxml2-utils \
          xsltproc \
          zip \
          gcc-12-aarch64-linux-gnu \
          g++-12-aarch64-linux-gnu \
          gcc-12-arm-linux-gnueabihf \
          g++-12-arm-linux-gnueabihf

    - name: Cache kernel build
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          /home/runner/work/android/kernel
        key: kernel-${{ env.DEVICE }}-${{ github.sha }}
        restore-keys: |
          kernel-${{ env.DEVICE }}-

    - name: Clone kernel source
      env:
        GIT_TERMINAL_PROMPT: 0
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p $ANDROID_ROOT
        cd $ANDROID_ROOT

        # Remove existing kernel directory if it exists
        if [ -d "kernel/oneplus/sdm845" ]; then
          echo "Removing existing kernel directory..."
          rm -rf kernel/oneplus/sdm845
        fi

        # Configure git to avoid interactive prompts
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"

        # Setup git credential helper for GitHub
        git config --global credential.helper store
        echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > ~/.git-credentials

        # Clone only the kernel (much smaller than full Android source)
        git clone --depth 1 --single-branch --branch lineage-16.0 \
          https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git \
          kernel/oneplus/sdm845

    - name: Apply kernel patches for Docker support
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # List available defconfigs
        echo "Available defconfigs:"
        ls arch/arm64/configs/*_defconfig

        # Find the correct defconfig for fajita
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Using defconfig: $DEFCONFIG"

        # Apply Docker kernel patch using the script
        bash $GITHUB_WORKSPACE/scripts/apply-docker-kernel-patch-v2.sh

        # Show added config
        tail -50 arch/arm64/configs/$DEFCONFIG

    - name: Build kernel
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Create symlinks for cross-compilers
        sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc
        sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-12 /usr/bin/aarch64-linux-gnu-g++

        # Setup build environment using Ubuntu cross-compilers
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=aarch64-linux-gnu-gcc
        export PATH=/usr/bin:$PATH

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Building with defconfig: $DEFCONFIG"

        # Build kernel
        make $DEFCONFIG

        # Disable stack protector to avoid compiler not supporting -fstack-protector-strong
        sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/CONFIG_CC_STACKPROTECTOR_STRONG=n/g' .config || true
        sed -i 's/CONFIG_CC_STACKPROTECTOR=y/CONFIG_CC_STACKPROTECTOR=n/g' .config || true
        sed -i 's/CONFIG_CC_STACKPROTECTOR_REGULAR=y/CONFIG_CC_STACKPROTECTOR_REGULAR=n/g' .config || true

        # Clean problematic drivers to avoid compilation errors
        bash $GITHUB_WORKSPACE/scripts/clean-kernel-drivers.sh $ANDROID_ROOT/kernel/oneplus/sdm845

        # Build kernel with stack protector disabled
        make -j$(nproc) Image.gz KCFLAGS="-Wno-error -fno-stack-protector" WERROR=0

        # Build device tree
        make -j$(nproc) dtbs

        # Check if kernel image was built
        if [ ! -f arch/arm64/boot/Image.gz ]; then
          echo "Error: Kernel image not found"
          exit 1
        fi

        ls -lh arch/arm64/boot/Image.gz

        # Find device tree file
        DTB_FILE=$(find arch/arm64/boot/dts -name "*fajita*.dtb" | head -1)
        if [ -z "$DTB_FILE" ]; then
          DTB_FILE=$(find arch/arm64/boot/dts -name "*sdm845*.dtb" | head -1)
        fi

        if [ -z "$DTB_FILE" ]; then
          echo "Error: Device tree file not found"
          echo "Available DTB files:"
          find arch/arm64/boot/dts -name "*.dtb" | head -20
          exit 1
        fi

        echo "Device tree file: $DTB_FILE"
        ls -lh "$DTB_FILE"

        # Show device tree model
        echo "Device tree model:"
        dtc -I dtb -O dts "$DTB_FILE" | grep -E "model|compatible" | head -10

    - name: Download original boot.img
      run: |
        cd $ANDROID_ROOT
        mkdir -p boot-repack
        cd boot-repack

        # Download original boot.img from GitHub Releases
        echo "Downloading original boot.img..."
        wget -O droid-boot.img \
          https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/droid-boot-new.img

        # Verify download
        ls -lh droid-boot.img
        file droid-boot.img

    - name: Install mkbootimg
      run: |
        sudo apt-get update
        sudo apt-get install -y mkbootimg

    - name: Unpack original boot.img
      run: |
        cd $ANDROID_ROOT/boot-repack

        # Unpack boot.img
        echo "Unpacking boot.img..."
        mkbootimg --unpack droid-boot.img

        # Show unpacked files
        echo "Unpacked files:"
        ls -lh

        # Show bootimg.cfg
        echo "Boot configuration:"
        cat bootimg.cfg

    - name: Replace kernel and device tree
      run: |
        cd $ANDROID_ROOT/boot-repack

        # Copy new kernel
        echo "Replacing kernel..."
        cp $ANDROID_ROOT/kernel/oneplus/sdm845/arch/arm64/boot/Image.gz kernel

        # Find device tree file
        DTB_FILE=$(find $ANDROID_ROOT/kernel/oneplus/sdm845/arch/arm64/boot/dts -name "*fajita*.dtb" | head -1)
        if [ -z "$DTB_FILE" ]; then
          DTB_FILE=$(find $ANDROID_ROOT/kernel/oneplus/sdm845/arch/arm64/boot/dts -name "*sdm845*.dtb" | head -1)
        fi

        if [ -z "$DTB_FILE" ]; then
          echo "Error: Device tree file not found"
          exit 1
        fi

        echo "Replacing device tree..."
        echo "Device tree file: $DTB_FILE"
        cp "$DTB_FILE" dtb

        # Verify
        ls -lh kernel
        ls -lh dtb

    - name: Repack boot.img
      run: |
        cd $ANDROID_ROOT/boot-repack

        # Read bootimg.cfg and extract parameters
        echo "Reading boot configuration..."
        BASE=$(grep "^base" bootimg.cfg | awk '{print $2}')
        PAGESIZE=$(grep "^pagesize" bootimg.cfg | awk '{print $2}')
        KERNEL_OFFSET=$(grep "^kernel_offset" bootimg.cfg | awk '{print $2}')
        RAMDISK_OFFSET=$(grep "^ramdisk_offset" bootimg.cfg | awk '{print $2}')
        SECOND_OFFSET=$(grep "^second_offset" bootimg.cfg | awk '{print $2}')
        TAGS_OFFSET=$(grep "^tags_offset" bootimg.cfg | awk '{print $2}')
        DTB_OFFSET=$(grep "^dtb_offset" bootimg.cfg | awk '{print $2}')
        CMDLINE=$(grep "^cmdline" bootimg.cfg | sed 's/cmdline //')

        echo "Boot parameters:"
        echo "  BASE=$BASE"
        echo "  PAGESIZE=$PAGESIZE"
        echo "  KERNEL_OFFSET=$KERNEL_OFFSET"
        echo "  RAMDISK_OFFSET=$RAMDISK_OFFSET"
        echo "  SECOND_OFFSET=$SECOND_OFFSET"
        echo "  TAGS_OFFSET=$TAGS_OFFSET"
        echo "  DTB_OFFSET=$DTB_OFFSET"
        echo "  CMDLINE=$CMDLINE"

        # Check if DTB exists
        if [ -f "dtb" ]; then
          DTB_PARAM="--dtb dtb"
          echo "Using DTB from unpacked boot.img"
        else
          DTB_PARAM=""
          echo "No DTB found, skipping"
        fi

        # Repack boot.img using command line parameters
        echo "Repacking boot.img..."
        mkbootimg \
          --kernel kernel \
          --ramdisk ramdisk \
          --cmdline "$CMDLINE" \
          --base "$BASE" \
          --pagesize "$PAGESIZE" \
          --kernel_offset "$KERNEL_OFFSET" \
          --ramdisk_offset "$RAMDISK_OFFSET" \
          --second_offset "$SECOND_OFFSET" \
          --tags_offset "$TAGS_OFFSET" \
          $DTB_PARAM \
          --output hybris-boot.img

        # Verify
        ls -lh hybris-boot.img
        file hybris-boot.img

    - name: Upload boot image
      uses: actions/upload-artifact@v4
      with:
        name: boot-${{ env.DEVICE }}-${{ env.RELEASE }}
        path: ${{ env.ANDROID_ROOT }}/boot-repack/hybris-boot.img
        retention-days: 30

    - name: Generate build summary
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          DEFCONFIG="unknown"
        fi

        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Device**: ${{ env.DEVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release**: ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel**: sdm845" >> $GITHUB_STEP_SUMMARY
        echo "- **Defconfig**: $DEFCONFIG" >> $GITHUB_STEP_SUMMARY
        echo "- **Docker Support**: Enabled" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- hybris-boot.img (complete boot image with Docker support)" >> $GITHUB_STEP_SUMMARY
        echo "- Image.gz (kernel image)" >> $GITHUB_STEP_SUMMARY
        echo "- kernel config" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Flash Instructions" >> $GITHUB_STEP_SUMMARY
        echo "1. Download hybris-boot.img from artifacts" >> $GITHUB_STEP_SUMMARY
        echo "2. Reboot to bootloader:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   adb reboot bootloader" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "3. Flash boot image:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   fastboot flash boot hybris-boot.img" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "4. Reboot:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   fastboot reboot" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "5. Enable network forwarding:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   sudo sysctl -w net.ipv4.ip_forward=1" >> $GITHUB_STEP_SUMMARY
        echo "   sudo sysctl -w net.ipv6.conf.all.forwarding=1" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "6. Verify Docker:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   docker run --rm hello-world" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
