name: Build Hybris Boot Image

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'fajita'
      release:
        description: 'SailfishOS release version'
        required: true
        default: '5.0.0.73'
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/build-hybris-boot.yml'
      - 'scripts/apply-docker-kernel-patch-v2.sh'
      - 'scripts/clean-kernel-drivers.sh'
      - 'scripts/clean-kernel-drivers-v2.sh'
      - 'scripts/create-empty-trace-headers.sh'

env:
  DEVICE: ${{ github.event.inputs.device || 'fajita' }}
  RELEASE: ${{ github.event.inputs.release || '5.0.0.73' }}
  ANDROID_ROOT: /home/runner/work/android
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-hybris-boot:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          curl \
          unzip \
          build-essential \
          ccache \
          python3 \
          python3-pip \
          openjdk-8-jdk \
          rsync \
          bc \
          bison \
          flex \
          lib32ncurses-dev \
          lib32z1-dev \
          libssl-dev \
          libxml2-utils \
          xsltproc \
          zip \
          gcc-12-aarch64-linux-gnu \
          g++-12-aarch64-linux-gnu \
          gcc-12-arm-linux-gnueabihf \
          g++-12-arm-linux-gnueabihf

    - name: Cache kernel build
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          /home/runner/work/android/kernel
        key: kernel-${{ env.DEVICE }}-${{ github.sha }}
        restore-keys: |
          kernel-${{ env.DEVICE }}-

    - name: Clone kernel source
      env:
        GIT_TERMINAL_PROMPT: 0
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p $ANDROID_ROOT
        cd $ANDROID_ROOT

        # Remove existing kernel directory if it exists
        if [ -d "kernel/oneplus/sdm845" ]; then
          echo "Removing existing kernel directory..."
          rm -rf kernel/oneplus/sdm845
        fi

        # Configure git to avoid interactive prompts
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"

        # Setup git credential helper for GitHub
        git config --global credential.helper store
        echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > ~/.git-credentials

        # Clone only the kernel (much smaller than full Android source)
        git clone --depth 1 --single-branch --branch lineage-16.0 \
          https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git \
          kernel/oneplus/sdm845

    - name: Apply kernel patches for Docker support
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # List available defconfigs
        echo "Available defconfigs:"
        ls arch/arm64/configs/*_defconfig

        # Find the correct defconfig for fajita
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Using defconfig: $DEFCONFIG"

        # Apply Docker kernel patch using the script
        bash $GITHUB_WORKSPACE/scripts/apply-docker-kernel-patch-v2.sh

        # Show added config
        tail -50 arch/arm64/configs/$DEFCONFIG

    - name: Build kernel
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Create symlinks for cross-compilers
        sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc
        sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-12 /usr/bin/aarch64-linux-gnu-g++

        # Setup build environment using Ubuntu cross-compilers
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=aarch64-linux-gnu-gcc
        export PATH=/usr/bin:$PATH

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Building with defconfig: $DEFCONFIG"

        # Clean problematic drivers to avoid compilation errors
        # IMPORTANT: This must run BEFORE make defconfig, because make defconfig reads Kconfig files
        # Use v2 script to preserve power management and clock drivers (required for boot)
        bash $GITHUB_WORKSPACE/scripts/clean-kernel-drivers-v2.sh $ANDROID_ROOT/kernel/oneplus/sdm845

        # Create empty trace headers to fix compilation errors
        bash $GITHUB_WORKSPACE/scripts/create-empty-trace-headers.sh $ANDROID_ROOT/kernel/oneplus/sdm845

        # Build kernel
        make $DEFCONFIG

        # Disable stack protector to avoid compiler not supporting -fstack-protector-strong
        sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/CONFIG_CC_STACKPROTECTOR_STRONG=n/g' .config || true
        sed -i 's/CONFIG_CC_STACKPROTECTOR=y/CONFIG_CC_STACKPROTECTOR=n/g' .config || true
        sed -i 's/CONFIG_CC_STACKPROTECTOR_REGULAR=y/CONFIG_CC_STACKPROTECTOR_REGULAR=n/g' .config || true

        # Build kernel with stack protector disabled
        make -j$(nproc) Image.gz KCFLAGS="-Wno-error -fno-stack-protector -Wno-implicit-function-declaration" WERROR=0 HOSTCFLAGS="-Wno-error"

        # Build device tree
        # Skip device tree compilation (use dtb from original boot.img)

        # Check if kernel image was built
        if [ ! -f arch/arm64/boot/Image.gz ]; then
          echo "Error: Kernel image not found"
          exit 1
        fi

        ls -lh arch/arm64/boot/Image.gz

        # Note: Device tree will be extracted from original boot.img later

    - name: Download LineageOS 16 boot.img
      run: |
        cd $ANDROID_ROOT
        mkdir -p boot-repack
        cd boot-repack

        # Download LineageOS 16 OTA package
        echo "Downloading LineageOS 16 OTA package..."
        wget -O lineage-16.0-fajita.zip \
          https://gh-proxy.com/https://github.com/VerdandiTeam/droid-config-enchilada/releases/download/4.5.0.13/lineage-16.0-20200325-nightly-fajita-signed.zip

        # Verify download
        ls -lh lineage-16.0-fajita.zip

        # Clone payload_dumper
        cd $ANDROID_ROOT
        git clone https://github.com/vm03/payload_dumper.git
        cd payload_dumper
        pip3 install -q protobuf bsdiff4 brotli zstandard fsspec

        # Extract boot.img from OTA package
        python3 payload_dumper.py ../boot-repack/lineage-16.0-fajita.zip

        # Copy boot.img and dtbo.img
        cp output/boot.img ../boot-repack/
        cp output/dtbo.img ../boot-repack/

        # Verify
        ls -lh ../boot-repack/boot.img
        ls -lh ../boot-repack/dtbo.img

    - name: Install boot image tools
      run: |
        sudo apt-get update
        sudo apt-get install -y abootimg
        # Install Android mkbootimg from AOSP
        git clone https://github.com/osm0sis/mkbootimg.git /tmp/mkbootimg
        cd /tmp/mkbootimg
        # Remove -Werror flag from all Makefiles to avoid treating warnings as errors
        sed -i 's/-Werror//g' Makefile
        sed -i 's/-Werror//g' libmincrypt/Makefile
        make
        sudo cp mkbootimg /usr/local/bin/
        sudo cp unpackbootimg /usr/local/bin/
        sudo chmod +x /usr/local/bin/mkbootimg
        sudo chmod +x /usr/local/bin/unpackbootimg

    - name: Unpack LineageOS 16 boot.img
      run: |
        cd $ANDROID_ROOT/boot-repack

        # Unpack boot.img using abootimg
        echo "Unpacking boot.img..."
        abootimg -x boot.img bootimg.cfg zImage initrd.img dtb

        # Show unpacked files
        echo "Unpacked files:"
        ls -lh

        # Show boot configuration
        if [ -f "bootimg.cfg" ]; then
          echo "Boot configuration:"
          cat bootimg.cfg
        fi

        # Check for kernel and ramdisk
        if [ -f "zImage" ]; then
          echo "Kernel file found"
          file zImage 2>/dev/null || true
        fi
        if [ -f "initrd.img" ]; then
          echo "Ramdisk file found"
          file initrd.img 2>/dev/null || true
        fi
        if [ -f "dtb" ]; then
          echo "DTB file found"
          file dtb 2>/dev/null || true
        else
          echo "Warning: No dtb file found"
          echo "Using dtbo.img as dtb..."
          cp dtbo.img dtb
          echo "DTB created from dtbo.img"
        fi

    - name: Replace kernel
      run: |
        cd $ANDROID_ROOT/boot-repack

        # Copy new kernel (keep it compressed as Image.gz)
        echo "Copying new kernel..."
        cp $ANDROID_ROOT/kernel/oneplus/sdm845/arch/arm64/boot/Image.gz zImage

        # Note: Device tree (dtb) is already extracted from original boot.img
        # We will use the original device tree

        # Verify
        ls -lh zImage
        if [ -f "dtb" ]; then
          ls -lh dtb
        else
          echo "Warning: No dtb file found in unpacked boot.img"
        fi
        if [ -f "initrd.img" ]; then
          ls -lh initrd.img
        fi

    - name: Repack boot.img
      run: |
        cd $ANDROID_ROOT/boot-repack

        # Check if all required files exist
        echo "Checking required files..."
        if [ ! -f "zImage" ]; then
          echo "Error: zImage not found"
          exit 1
        fi
        if [ ! -f "initrd.img" ]; then
          echo "Error: initrd.img not found"
          exit 1
        fi

        echo "All required files found"
        ls -lh zImage initrd.img

        # Check if dtb exists
        if [ -f "dtb" ]; then
          echo "DTB file found, will include in boot.img"
          ls -lh dtb
          DTB_PARAM="--dtb dtb"
        else
          echo "Warning: No dtb file found, boot.img may not boot"
          DTB_PARAM=""
        fi

        # Repack boot.img using mkbootimg (supports Android boot.img v2/v3/v4)
        echo "Repacking boot.img with mkbootimg..."
        mkbootimg \
          --kernel zImage \
          --ramdisk initrd.img \
          --cmdline "androidboot.hardware=qcom androidboot.console=ttyMSM0 video=vfb:640x400,bpp=32,memsize=3072000 msm_rtb.filter=0x237 ehci-hcd.park=3 lpm_levels.sleep_disabled=1 service_locator.enable=1 swiotlb=2048 androidboot.configfs=true androidboot.usbcontroller=a600000.dwc3 firmware_class.path=/vendor/firmware_mnt/image loop.max_part=7 buildvariant=userdebug" \
          --base 0x80000000 \
          --pagesize 4096 \
          --kernel_offset 0x00008000 \
          --ramdisk_offset 0x01000000 \
          --second_offset 0x00f00000 \
          --tags_offset 0x00000100 \
          $DTB_PARAM \
          -o hybris-boot.img

        # Verify
        if [ ! -f "hybris-boot.img" ]; then
          echo "Error: hybris-boot.img not created"
          exit 1
        fi

        ls -lh hybris-boot.img
        file hybris-boot.img

        # Show boot image info
        abootimg -i hybris-boot.img 2>/dev/null || echo "abootimg info not available"

    - name: Upload boot image
      uses: actions/upload-artifact@v4
      with:
        name: boot-${{ env.DEVICE }}-${{ env.RELEASE }}
        path: ${{ env.ANDROID_ROOT }}/boot-repack/hybris-boot.img
        retention-days: 30

    - name: Generate build summary
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          DEFCONFIG="unknown"
        fi

        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Device**: ${{ env.DEVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release**: ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel**: sdm845" >> $GITHUB_STEP_SUMMARY
        echo "- **Defconfig**: $DEFCONFIG" >> $GITHUB_STEP_SUMMARY
        echo "- **Docker Support**: Enabled" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- hybris-boot.img (complete boot image with Docker support)" >> $GITHUB_STEP_SUMMARY
        echo "- Image.gz (kernel image)" >> $GITHUB_STEP_SUMMARY
        echo "- kernel config" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Flash Instructions" >> $GITHUB_STEP_SUMMARY
        echo "1. Download hybris-boot.img from artifacts" >> $GITHUB_STEP_SUMMARY
        echo "2. Reboot to bootloader:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   adb reboot bootloader" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "3. Flash boot image:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   fastboot flash boot hybris-boot.img" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "4. Reboot:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   fastboot reboot" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "5. Enable network forwarding:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   sudo sysctl -w net.ipv4.ip_forward=1" >> $GITHUB_STEP_SUMMARY
        echo "   sudo sysctl -w net.ipv6.conf.all.forwarding=1" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "6. Verify Docker:" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "   docker run --rm hello-world" >> $GITHUB_STEP_SUMMARY
        echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
