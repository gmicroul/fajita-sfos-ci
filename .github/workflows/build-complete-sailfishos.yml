name: Build Complete SailfishOS for fajita

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'fajita'
      release:
        description: 'SailfishOS release version'
        required: true
        default: '5.0.0.73'
  push:
    branches: [ main, master ]
    paths:
      - 'fajita-sfos-ci/**'
      - '.github/workflows/build-complete-sailfishos.yml'
      - 'scripts/clean-kernel-drivers.sh'

permissions:
  contents: write

env:
  DEVICE: ${{ github.event.inputs.device != '' && github.event.inputs.device || 'fajita' }}
  RELEASE: ${{ github.event.inputs.release != '' && github.event.inputs.release || '5.0.0.73' }}
  ANDROID_ROOT: /home/runner/work/android
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Build SailfishOS system image
  build-sailfishos:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    env:
      DEVICE: ${{ github.event.inputs.device != '' && github.event.inputs.device || 'fajita' }}
      RELEASE: ${{ github.event.inputs.release != '' && github.event.inputs.release || '5.0.0.73' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker container
        run: |
          sudo docker pull coderus/sailfishos-platform-sdk-base:latest
          sudo docker run --privileged --name sailfish-sdk -d coderus/sailfishos-platform-sdk-base:latest tail -f /dev/null

      - name: Copy files into Docker container
        run: |
          sudo docker cp . sailfish-sdk:/workspace

      - name: Run build inside Docker
        run: |
          sudo docker exec sailfish-sdk sh -c "cd /workspace && source ./fajita.env && sudo bash ./run-mic1.sh"

      - name: List files in Docker container
        run: |
          sudo docker exec sailfish-sdk ls -R /workspace  # List files recursively to verify output location

      - name: Archive artifacts
        run: |
          # Create artifacts directory
          sudo mkdir -p /home/runner/work/fajita-sfos-ci/fajita-sfos-ci/artifacts/

          # List output directory
          sudo docker exec sailfish-sdk ls -ltrh /workspace/sfe-fajita-5.0.0.73/

          # Copy all files from Docker using docker cp
          # docker cp doesn't support wildcards, so copy the entire directory
          sudo docker cp sailfish-sdk:/workspace/sfe-fajita-5.0.0.73/ /home/runner/work/fajita-sfos-ci/fajita-sfos-ci/artifacts/

          # List copied files
          ls -lh /home/runner/work/fajita-sfos-ci/fajita-sfos-ci/artifacts/

      - name: Debug artifact directory
        run: |
          echo "Checking artifact directory:"
          ls -la /home/runner/work/fajita-sfos-ci/fajita-sfos-ci/artifacts/
          echo "File count:"
          find /home/runner/work/fajita-sfos-ci/fajita-sfos-ci/artifacts/ -type f | wc -l
          echo "Artifact name will be: sailfishos-${{ env.DEVICE }}-${{ env.RELEASE }}"

      - name: Upload SailfishOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sailfishos-artifacts
          path: /home/runner/work/fajita-sfos-ci/fajita-sfos-ci/artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Cleanup
        run: |
          sudo docker stop sailfish-sdk
          sudo docker rm sailfish-sdk

  # Job 2: Build hybris-boot.img
  build-hybris-boot:
    runs-on: ubuntu-latest
    needs: build-sailfishos

    env:
      DEVICE: ${{ github.event.inputs.device != '' && github.event.inputs.device || 'fajita' }}
      RELEASE: ${{ github.event.inputs.release != '' && github.event.inputs.release || '5.0.0.73' }}
      ANDROID_ROOT: /home/runner/work/android

    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          curl \
          unzip \
          build-essential \
          ccache \
          python3 \
          python3-pip \
          openjdk-8-jdk \
          rsync \
          bc \
          bison \
          flex \
          lib32ncurses-dev \
          lib32z1-dev \
          libssl-dev \
          libxml2-utils \
          xsltproc \
          zip \
          gcc-12-aarch64-linux-gnu \
          g++-12-aarch64-linux-gnu \
          gcc-12-arm-linux-gnueabihf \
          g++-12-arm-linux-gnueabihf

    - name: Install unpack tools
      run: |
        # Install abootimg for boot.img unpacking
        sudo apt-get install -y abootimg

    - name: Download droid-boot.img
      run: |
        mkdir -p $ANDROID_ROOT
        cd $ANDROID_ROOT
        wget -O droid-boot.img \
          "https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/droid-boot.img"
        ls -lh droid-boot.img

    - name: Cache kernel build
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          /home/runner/work/android/kernel
        key: kernel-${{ env.DEVICE }}-${{ github.sha }}
        restore-keys: |
          kernel-${{ env.DEVICE }}-

    - name: Clone kernel source
      env:
        GIT_TERMINAL_PROMPT: 0
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p $ANDROID_ROOT
        cd $ANDROID_ROOT

        # Configure git to avoid interactive prompts
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"

        # Setup git credential helper for GitHub
        git config --global credential.helper store
        echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > ~/.git-credentials

        # Remove existing kernel directory if it exists
        rm -rf kernel/oneplus/sdm845 || true

        # Clone only the kernel (much smaller than full Android source)
        git clone --depth 1 --single-branch --branch lineage-16.0 \
          https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git \
          kernel/oneplus/sdm845

    - name: Apply kernel patches for Docker support
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # List available defconfigs
        echo "Available defconfigs:"
        ls arch/arm64/configs/*_defconfig

        # Find the correct defconfig for fajita
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Using defconfig: $DEFCONFIG"

        # Backup original config
        cp arch/arm64/configs/$DEFCONFIG arch/arm64/configs/$DEFCONFIG.bak

        # Add Docker kernel options v2 - 基于一加6T实际检查结果
        cat >> arch/arm64/configs/$DEFCONFIG << 'EOF'

        # Docker support v2 - 基于一加6T实际检查结果

        # Generally Necessary - 网络过滤
        CONFIG_BRIDGE_NETFILTER=y
        CONFIG_IP6_NF_TARGET_MASQUERADE=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_MATCH_IPVS=y

        # Generally Necessary - 其他
        CONFIG_POSIX_MQUEUE=y
        CONFIG_IP6_NF_NAT=y

        # Optional Features - 存储和IO
        CONFIG_CFQ_GROUP_IOSCHED=y
        CONFIG_BLK_CGROUP=y
        CONFIG_BLK_DEV_THROTTLING=y

        # Optional Features - Cgroups
        CONFIG_CGROUP_PERF=y
        CONFIG_CGROUP_HUGETLB=y
        CONFIG_CGROUP_NET_PRIO=y
        CONFIG_CFS_BANDWIDTH=y

        # Optional Features - 安全
        CONFIG_SECURITY_APPARMOR=y

        # Optional Features - 文件系统
        CONFIG_EXT4_FS_POSIX_ACL=y

        # Optional Features - 网络驱动
        CONFIG_VXLAN=y
        CONFIG_BRIDGE_VLAN_FILTERING=y
        CONFIG_IPVLAN=y
        CONFIG_DUMMY=y

        # Optional Features - 存储驱动
        CONFIG_BTRFS_FS=y
        CONFIG_BTRFS_FS_POSIX_ACL=y

        # 禁用 EFI stub 避免链接错误
        CONFIG_EFI=n
        CONFIG_EFI_STUB=n
        EOF

        # Show added config
        tail -50 arch/arm64/configs/$DEFCONFIG

    - name: Build kernel
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Create symlinks for cross-compilers
        sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc
        sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-12 /usr/bin/aarch64-linux-gnu-g++

        # Setup build environment using Ubuntu cross-compilers
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=aarch64-linux-gnu-gcc
        export PATH=/usr/bin:$PATH

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Building with defconfig: $DEFCONFIG"

        # Build kernel
        make $DEFCONFIG

        # Clean problematic drivers
        bash $GITHUB_WORKSPACE/scripts/clean-kernel-drivers.sh $ANDROID_ROOT/kernel/oneplus/sdm845

        # Additional Kconfig cleanup
        sed -i '/source "drivers\/media\/platform\/msm\/vidc\/Kconfig"/d' drivers/media/platform/msm/Kconfig || true
        sed -i '/source "drivers\/esoc\/Kconfig"/d' drivers/Kconfig || true
        sed -i '/source "net\/ipc_router\/Kconfig"/d' net/Kconfig || true

        # Build kernel only (skip device tree to avoid interposer errors)
        make -j$(nproc) Image.gz

        # Check if kernel image was built
        if [ ! -f arch/arm64/boot/Image.gz ]; then
          echo "Error: Kernel image not found"
          exit 1
        fi

        ls -lh arch/arm64/boot/Image.gz

    - name: Unpack droid-boot.img
      run: |
        cd $ANDROID_ROOT

        # Create unpack directory
        mkdir -p boot-unpack
        cd boot-unpack

        # Unpack boot.img using abootimg
        abootimg -x ../droid-boot.img

        # List unpacked files
        ls -lh

        # Show bootimg.cfg
        cat bootimg.cfg

        # Show kernel info
        if [ -f zImage ]; then
          file zImage
          ls -lh zImage
        fi

    - name: Replace kernel in boot.img
      run: |
        cd $ANDROID_ROOT/boot-unpack

        # Backup original kernel
        if [ -f zImage ]; then
          cp zImage zImage.orig
        fi

        # Copy new kernel
        cp ../kernel/oneplus/sdm845/arch/arm64/boot/Image.gz zImage

        # Show new kernel info
        file zImage
        ls -lh zImage

    - name: Repack hybris-boot.img
      run: |
        cd $ANDROID_ROOT/boot-unpack

        # Create new boot.img using abootimg
        abootimg --create ../hybris-boot.img -f bootimg.cfg -k zImage -r initrd.img

        # Show result
        ls -lh ../hybris-boot.img

    - name: Upload hybris-boot.img
      uses: actions/upload-artifact@v4
      with:
        name: hybris-boot-artifact
        path: ${{ env.ANDROID_ROOT }}/hybris-boot.img
        retention-days: 30

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image-artifact
        path: ${{ env.ANDROID_ROOT }}/kernel/oneplus/sdm845/arch/arm64/boot/Image.gz
        retention-days: 30

    - name: Upload kernel config
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Find the correct defconfig
        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        # Copy config to output
        mkdir -p $ANDROID_ROOT/output
        cp arch/arm64/configs/$DEFCONFIG $ANDROID_ROOT/output/kernel.config

    - name: Upload kernel config artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-config-artifact
        path: ${{ env.ANDROID_ROOT }}/output/kernel.config
        retention-days: 30

  # Job 3: Download all artifacts and create release
  create-release:
    runs-on: ubuntu-latest
    needs: [build-sailfishos, build-hybris-boot]
    permissions:
      contents: write

    env:
      DEVICE: ${{ github.event.inputs.device != '' && github.event.inputs.device || 'fajita' }}
      RELEASE: ${{ github.event.inputs.release != '' && github.event.inputs.release || '5.0.0.73' }}

    steps:
    - name: Download SailfishOS artifact
      uses: actions/download-artifact@v4
      with:
        name: sailfishos-artifacts
        path: ./artifacts/sailfishos

    - name: Download hybris-boot artifact
      uses: actions/download-artifact@v4
      with:
        name: hybris-boot-artifact
        path: ./artifacts/kernel

    - name: Download kernel image artifact
      uses: actions/download-artifact@v4
      with:
        name: kernel-image-artifact
        path: ./artifacts/kernel

    - name: Download kernel config artifact
      uses: actions/download-artifact@v4
      with:
        name: kernel-config-artifact
        path: ./artifacts/kernel

    - name: List all artifacts
      run: |
        echo "All artifacts:"
        ls -lhR ./artifacts

    - name: Generate build summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Device**: ${{ env.DEVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release**: ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel**: sdm845" >> $GITHUB_STEP_SUMMARY
        echo "- **Docker Support**: Enabled" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- SailfishOS system image (ZIP)" >> $GITHUB_STEP_SUMMARY
        echo "- hybris-boot.img (complete boot image with new kernel)" >> $GITHUB_STEP_SUMMARY
        echo "- Image.gz (kernel image only)" >> $GITHUB_STEP_SUMMARY
        echo "- kernel.config (kernel configuration)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### How to Install" >> $GITHUB_STEP_SUMMARY
        echo "1. Download all artifacts" >> $GITHUB_STEP_SUMMARY
        echo "2. Flash hybris-boot.img using fastboot:" >> $GITHUB_STEP_SUMMARY
        echo "   ```" >> $GITHUB_STEP_SUMMARY
        echo "   fastboot flash boot hybris-boot.img" >> $GITHUB_STEP_SUMMARY
        echo "   fastboot reboot" >> $GITHUB_STEP_SUMMARY
        echo "   ```" >> $GITHUB_STEP_SUMMARY
        echo "3. Install SailfishOS system image using the ZIP file" >> $GITHUB_STEP_SUMMARY

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: sailfishos-complete-${{ env.DEVICE }}-${{ env.RELEASE }}-${{ github.run_number }}
        name: Complete SailfishOS - ${{ env.DEVICE }} - ${{ env.RELEASE }} - Build ${{ github.run_number }}
        body: |
          ## Complete SailfishOS Build for ${{ env.DEVICE }}

          ### Build Information
          - **Device**: ${{ env.DEVICE }}
          - **SailfishOS Release**: ${{ env.RELEASE }}
          - **Kernel**: sdm845
          - **Build Number**: ${{ github.run_number }}
          - **Commit**: ${{ github.sha }}
          - **Docker Support**: Enabled

          ### Files
          - `sailfishos-*.zip` - SailfishOS system image
          - `hybris-boot.img` - Complete boot image with new kernel (flash this to your device)
          - `Image.gz` - Kernel image only
          - `kernel.config` - Kernel configuration

          ### How to Install
          1. Download all files
          2. Flash hybris-boot.img using fastboot:
             ```
             fastboot flash boot hybris-boot.img
             fastboot reboot
             ```
          3. Install SailfishOS system image using the ZIP file

          ### Docker Support
          This kernel includes full Docker support with the following features:
          - Namespaces and Cgroups
          - Overlay filesystem
          - Network filtering and masquerading
          - Bridge and VXLAN support
          - AppArmor security

          Built by GitHub Actions
        files: |
          ./artifacts/sailfishos/*
          ./artifacts/kernel/*
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
