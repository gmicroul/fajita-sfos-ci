name: Build YOLOv8 ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git cmake build-essential wget curl python3-pip \
          unzip zip bison flex libprotobuf-dev protobuf-compiler \
          pkg-config g++-aarch64-linux-gnu

    - name: Clone ONNX Runtime
      run: |
        git clone --branch main https://github.com/microsoft/onnxruntime.git onnxruntime
        cd onnxruntime
        git submodule update --init --recursive

    - name: Build ONNX Runtime (ARM64)
      run: |
        cd onnxruntime
        mkdir -p build/Linux
        python3 tools/ci_build/build.py \
          --update \
          --build \
          --config Release \
          --parallel $(nproc) \
          --build_shared_lib \
          --build_dir build/Linux \
          --arm \
          --arm-target-os Linux \
          --arm-target-arch arm64 \
          --arm-compiler /usr/bin/aarch64-linux-gnu-g++

    - name: Build YOLOv8 Application
      run: |
        mkdir -p build_app && cd build_app
        cmake .. -DCMAKE_PREFIX_PATH=../onnxruntime/build/Linux
        make -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: yolov8_app
        path: build_app/yolov8_app
