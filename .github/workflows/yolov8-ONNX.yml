name: Build YOLOv8 ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout workflow repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git cmake build-essential wget curl python3-pip \
          unzip zip bison flex libprotobuf-dev protobuf-compiler \
          pkg-config g++-aarch64-linux-gnu

    - name: Clone ONNX Runtime official main branch
      run: |
        git clone --branch main https://github.com/microsoft/onnxruntime.git onnxruntime
        cd onnxruntime
        git submodule update --init --recursive
        ls -l CMakeLists.txt  # 确认 CMakeLists.txt 存在

    - name: Create ARM64 CMake toolchain
      run: |
        mkdir -p onnxruntime/build/Linux
        cat > onnxruntime/arm64-toolchain.cmake <<EOL
        set(CMAKE_SYSTEM_NAME Linux)
        set(CMAKE_SYSTEM_PROCESSOR aarch64)
        set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
        set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
        EOL

    - name: Build ONNX Runtime (ARM64)
      run: |
        cmake -S onnxruntime -B onnxruntime/build/Linux \
          -DCMAKE_BUILD_TYPE=Release \
          -Donnxruntime_BUILD_SHARED_LIB=ON \
          -DCMAKE_TOOLCHAIN_FILE=onnxruntime/arm64-toolchain.cmake
        cmake --build onnxruntime/build/Linux --parallel $(nproc)

    - name: Build YOLOv8 Application
      run: |
        mkdir -p build_app && cd build_app
        cmake .. -DCMAKE_PREFIX_PATH=../onnxruntime/build/Linux
        make -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: yolov8_app
        path: build_app/yolov8_app
