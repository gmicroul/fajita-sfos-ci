name: Build YOLOv8 Static for Sailfish OS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    env:
      QT_DIR: /opt/Qt5.15.2   # CI Qt 路径
      ARMLIB_PATH: deploy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake git python3 python3-pip build-essential \
                              zlib1g-dev protobuf-compiler libprotobuf-dev \
                              pkg-config libopencv-dev wget
          sudo apt install -y g++-aarch64-linux-gnu  # ARM64 交叉编译器
          pip3 install flatbuffers

      - name: Clone ONNX Runtime
        run: |
          git clone --recursive https://github.com/microsoft/onnxruntime
          cd onnxruntime
          # 设置交叉编译环境变量
          export ORT_CROSS_COMPILER=/usr/bin/aarch64-linux-gnu-
          export ORT_TARGET_OS=Linux
          export ORT_TARGET_ARCH=arm64
          export ORT_BUILD_DIR=build/Linux
          # 静态编译 ONNX Runtime
          python3 ./tools/ci_build/build.py --update --build --config Release --build_static_lib --parallel

      - name: Prepare ONNX Runtime for Qt build
        run: |
          mkdir -p deploy/include/onnxruntime
          cp -r onnxruntime/include/onnxruntime/* deploy/include/onnxruntime/
          cp onnxruntime/build/Linux/Release/libonnxruntime.a deploy/

      - name: Build Qt YOLOv8 project (static link)
        run: |
          export PATH=$QT_DIR/bin:$PATH
          qmake yolov8_app.pro -spec linux-g++ CONFIG+=release \
                QMAKE_CXX=/usr/bin/aarch64-linux-gnu-g++ \
                QMAKE_CC=/usr/bin/aarch64-linux-gnu-gcc \
                QMAKE_LFLAGS+=" $PWD/deploy/libonnxruntime.a -static-libgcc -static-libstdc++"
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolov8-static-arm64
          path: |
            yolov8_app
            deploy/include/onnxruntime
