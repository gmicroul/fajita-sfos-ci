name: Build YOLOv8 for Sailfish OS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    env:
      QT_DIR: /opt/Qt5.15.2
      CMAKE_BUILD_TYPE: Release
      ARMLIB_PATH: build/Linux/Release

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake git python3 python3-pip build-essential wget \
                              zlib1g-dev protobuf-compiler libprotobuf-dev \
                              pkg-config libopencv-dev g++-aarch64-linux-gnu

      - name: Build ONNX Runtime
        run: |
          git submodule update --init --recursive
          ./build.sh --config Release \
                     --build_shared_lib \
                     --parallel \
                     --arm \
                     --arm-target-os Linux \
                     --arm-target-arch arm64 \
                     --arm-compiler /usr/bin/aarch64-linux-gnu-g++ \
                     --update --build

      - name: Install ONNX Runtime headers and lib for Qt build
        run: |
          mkdir -p ./deploy/include/onnxruntime
          cp include/onnxruntime/*.h ./deploy/include/onnxruntime/
          cp build/Linux/Release/libonnxruntime.so ./deploy/

      - name: Configure Qt project for cross-compilation
        run: |
          export PATH=$QT_DIR/bin:$PATH
          # 设置交叉编译器
          qmake yolov8_app.pro -spec linux-g++ CONFIG+=release \
                QMAKE_CXX=/usr/bin/aarch64-linux-gnu-g++ \
                QMAKE_CC=/usr/bin/aarch64-linux-gnu-gcc \
                QMAKE_LFLAGS+=" -L$PWD/deploy"
          make -j$(nproc)

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yolov8-arm64
          path: |
            yolov8_app
            deploy/libonnxruntime.so
            deploy/include/onnxruntime
