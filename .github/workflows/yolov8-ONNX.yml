name: Build YOLOv8 for Sailfish OS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-arm:
    runs-on: ubuntu-latest

    env:
      QT_DIR: /opt/Qt5.15.2
      ARMLIB_PATH: deploy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master  # 改成 master 分支

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake git python3 python3-pip build-essential \
                              zlib1g-dev protobuf-compiler libprotobuf-dev \
                              pkg-config libopencv-dev wget
          sudo apt install -y g++-aarch64-linux-gnu # ARM64 交叉编译器
          pip3 install flatbuffers

      - name: Clone ONNX Runtime
        run: |
          git clone --recursive https://github.com/microsoft/onnxruntime
          cd onnxruntime
          # 设置交叉编译环境变量
          export ORT_CROSS_COMPILER=/usr/bin/aarch64-linux-gnu-
          export ORT_TARGET_OS=Linux
          export ORT_TARGET_ARCH=arm64
          export ORT_BUILD_DIR=build/Linux
          python3 ./tools/ci_build/build.py --update --build --config Release --build_shared_lib --parallel

      - name: Prepare ONNX Runtime for Qt build
        run: |
          mkdir -p deploy/include/onnxruntime
          cp onnxruntime/include/onnxruntime/*.h deploy/include/onnxruntime/
          cp onnxruntime/build/Linux/Release/libonnxruntime.so deploy/

      - name: Build Qt YOLOv8 project
        run: |
          export PATH=$QT_DIR/bin:$PATH
          qmake yolov8_app.pro -spec linux-g++ CONFIG+=release \
                QMAKE_CXX=/usr/bin/aarch64-linux-gnu-g++ \
                QMAKE_CC=/usr/bin/aarch64-linux-gnu-gcc \
                QMAKE_LFLAGS+=" -L$PWD/deploy"
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolov8-arm64
          path: |
            yolov8_app
            deploy/libonnxruntime.so
            deploy/include/onnxruntime
