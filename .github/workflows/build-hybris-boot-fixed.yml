name: Build Hybris Boot Image - Fixed Ramdisk

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'fajita'
      release:
        description: 'SailfishOS release version'
        required: true
        default: '5.0.0.73'
  push:
    branches: [ main, master ]
    paths:
    - '.github/workflows/build-hybris-boot-fixed.yml'
    - 'scripts/**'

env:
  DEVICE: fajita
  RELEASE: 5.0.0.73
  ANDROID_ROOT: /home/runner/work/android
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-hybris-boot:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          curl \
          unzip \
          build-essential \
          ccache \
          python3 \
          python3-pip \
          rsync \
          bc \
          bison \
          flex \
          lib32ncurses-dev \
          lib32z1-dev \
          libssl-dev \
          libxml2-utils \
          xsltproc \
          zip \
          gcc-12-aarch64-linux-gnu \
          g++-12-aarch64-linux-gnu \
          abootimg

    - name: Clear kernel cache
      run: |
        echo "Clearing kernel cache..."
        if [ -d "/home/runner/work/android/kernel" ]; then
          rm -rf /home/runner/work/android/kernel
          echo "Removed cached kernel directory"
        fi

    - name: Clone kernel source
      env:
        GIT_TERMINAL_PROMPT: 0
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p $ANDROID_ROOT
        cd $ANDROID_ROOT

        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"

        git config --global credential.helper store
        echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > ~/.git-credentials

        if [ -d "kernel/oneplus/sdm845" ]; then
          rm -rf kernel/oneplus/sdm845
        fi

        git clone --depth 1 --single-branch --branch lineage-16.0 \
          https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git \
          kernel/oneplus/sdm845

    - name: Apply kernel patches for Docker support
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        echo "Available defconfigs:"
        ls arch/arm64/configs/*_defconfig

        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found"
          exit 1
        fi

        echo "Using defconfig: $DEFCONFIG"

        bash $GITHUB_WORKSPACE/scripts/apply-docker-kernel-patch-v2.sh

        tail -50 arch/arm64/configs/$DEFCONFIG

    - name: Build kernel
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc
        sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-12 /usr/bin/aarch64-linux-gnu-g++

        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=aarch64-linux-gnu-gcc
        export PATH=/usr/bin:$PATH

        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        else
          DEFCONFIG=sdm845_defconfig
        fi

        echo "Building with defconfig: $DEFCONFIG"

        # Fix kernel compilation errors
        bash $GITHUB_WORKSPACE/scripts/minimal-clean-kernel-drivers.sh $ANDROID_ROOT/kernel/oneplus/sdm845

        make $DEFCONFIG

        sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/CONFIG_CC_STACKPROTECTOR_STRONG=n/g' .config || true
        sed -i 's/CONFIG_CC_STACKPROTECTOR=y/CONFIG_CC_STACKPROTECTOR=n/g' .config || true
        sed -i 's/CONFIG_CC_STACKPROTECTOR_REGULAR=y/CONFIG_CC_STACKPROTECTOR_REGULAR=n/g' .config || true

        make -j$(nproc) Image.gz KCFLAGS="-Wno-error -fno-stack-protector -mcmodel=large" WERROR=0 HOSTCFLAGS="-Wno-error" 2>&1 | tee build.log || {
          echo "=== BUILD FAILED ==="
          tail -200 build.log
          exit 1
        }

        if [ ! -f arch/arm64/boot/Image.gz ]; then
          echo "Error: Kernel image not found"
          exit 1
        fi

        ls -lh arch/arm64/boot/Image.gz

    - name: Get Sailfish OS hybris ramdisk
      run: |
        cd $ANDROID_ROOT
        mkdir -p hybris-boot boot-repack

        echo "=== Step 1: Download Sailfish OS official image for fajita ==="
        echo "Trying to download Sailfish OS official image..."

        # Sailfish OS official images for OnePlus 6T (fajita)
        # These are the official release images that contain the correct hybris ramdisk
        SFOS_URLS=(
          "https://releases.sailfishos.org/sailfishos/images/sailfishos-4.7.0.19-fajita/lastSuccessful/build-artifacts/sfa-jolla-update-4.7.0.19-fajita.zip"
          "https://releases.sailfishos.org/sailfishos/images/sailfishos-5.0.0.73-fajita/sfa-jolla-update-5.0.0.73-fajita.zip"
        )

        DOWNLOADED=false
        for url in "${SFOS_URLS[@]}"; do
          echo "Trying: $url"
          if wget -O hybris-boot/sailfishos.zip "$url" 2>&1 | tail -5; then
            DOWNLOADED=true
            echo "Downloaded Sailfish OS image successfully"
            break
          fi
        done

        if [ "$DOWNLOADED" = "false" ]; then
          echo ""
          echo "=== Failed to download from official sources, trying alternatives ==="

          # Alternative: Try to get hybris ramdisk from a known-working image
          # Check GitHub releases for hybris-boot images that might have working ramdisk
          echo "Checking GitHub releases..."
          if wget -O hybris-boot/hybris-boot-known-good.img \
            "https://github.com/gmicroul/fajita-sfos-ci/releases/download/known-good/hybris-boot.img" 2>&1 | tail -3; then
            echo "Downloaded known-good hybris-boot.img"
          else
            echo "Could not download known-good image"
          fi
        fi

        ls -lh hybris-boot/

    - name: Extract hybris ramdisk from Sailfish OS image
      run: |
        cd $ANDROID_ROOT
        echo "=== Extracting hybris ramdisk ==="

        # Check what we downloaded
        if [ -f "hybris-boot/sailfishos.zip" ]; then
          echo "Found Sailfish OS zip, extracting..."
          cd hybris-boot
          unzip -o sailfishos.zip
          ls -lh

          # Find the boot image in the zip
          BOOT_IMG=$(find . -name "boot.img" -o -name "*.img" | grep -i sailfish | head -1)
          if [ -z "$BOOT_IMG" ]; then
            # Try to find in subdirectories
            BOOT_IMG=$(find . -type f -name "*.img" 2>/dev/null | head -5)
          fi
          echo "Found images: $BOOT_IMG"

          cd ..

          # If we have a boot.img, extract the ramdisk from it
          if [ -n "$BOOT_IMG" ] && [ -f "$BOOT_IMG" ]; then
            echo "Extracting ramdisk from: $BOOT_IMG"
            abootimg -x "$BOOT_IMG" -d hybris-boot/boot-repack || true
            ls -lh hybris-boot/boot-repack/
          fi
        fi

        if [ -f "hybris-boot/hybris-boot-known-good.img" ]; then
          echo "Extracting from known-good image..."
          cd hybris-boot
          abootimg -x hybris-boot-known-good.img -d boot-repack
          ls -lh boot-repack/
        fi

        # Verify we have a ramdisk
        if [ -f "boot-repack/initrd.img" ]; then
          echo "=== SUCCESS: Found hybris ramdisk ==="
          file boot-repack/initrd.img
          ls -lh boot-repack/initrd.img
        else
          echo "=== WARNING: Could not extract hybris ramdisk ==="
          echo "Files in boot-repack:"
          ls -lh boot-repack/ 2>/dev/null || echo "boot-repack not found"
        fi

    - name: Download Android droid-boot for kernel+dtb only
      run: |
        cd $ANDROID_ROOT

        echo "=== Downloading Android droid-boot.img for kernel and dtb ==="
        echo "We will use:"
        echo "  - NEW kernel (compiled with Docker support)"
        echo "  - NEW hybris ramdisk (from Sailfish OS image) <- THIS IS THE KEY FIX"
        echo "  - ORIGINAL dtb (from Android droid-boot.img)"

        mkdir -p boot-repack
        cd boot-repack

        wget -q -O droid-boot.img \
          "https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/droid-boot.img"

        ls -lh droid-boot.img

        # Extract dtb and kernel load address info
        abootimg -x droid-boot.img 2>/dev/null || true
        ls -lh

    - name: Combine: New kernel + hybris ramdisk + original dtb
      run: |
        cd $ANDROID_ROOT/boot-repack

        echo "=== Combining components ==="
        echo ""
        echo "Components:"
        echo "  1. NEW kernel: $ANDROID_ROOT/kernel/oneplus/sdm845/arch/arm64/boot/Image.gz"
        echo "  2. HYBRIS RAMDISK: boot-repack/initrd.img (from Sailfish OS)"
        echo "  3. ORIGINAL DTB: boot-repack/dtb (from Android)"
        echo ""

        # Check if we have hybris ramdisk
        if [ ! -f "initrd.img" ]; then
          echo "ERROR: No hybris ramdisk found!"
          echo "Cannot proceed without Sailfish OS hybris ramdisk."
          echo "The boot image would use Android's ramdisk which does NOT support Sailfish OS."
          exit 1
        fi

        # Verify ramdisk is from Sailfish OS (should contain hybris-specific files)
        echo "Verifying ramdisk contains Sailfish OS components..."
        if file initrd.img | grep -q "cpio"; then
          echo "Ramdisk format OK (cpio archive)"
        fi

        # Copy new kernel
        echo "Copying new kernel..."
        cp $ANDROID_ROOT/kernel/oneplus/sdm845/arch/arm64/boot/Image.gz zImage
        ls -lh zImage

        # Check original dtb
        if [ ! -f "dtb" ] || [ ! -s "dtb" ]; then
          echo "Warning: dtb missing or empty"
          if [ -f "dtbo.img" ]; then
            echo "Using dtbo.img as dtb"
            cp dtbo.img dtb
          fi
        fi

        ls -lh dtb initrd.img

    - name: Repack hybris-boot.img with correct ramdisk
      run: |
        cd $ANDROID_ROOT/boot-repack

        echo "=== Repacking boot.img ==="

        # Get original bootimg.cfg parameters
        if [ -f "bootimg.cfg" ]; then
          BOOT_SIZE=$(grep "^bootsize" bootimg.cfg | cut -d'=' -f2)
          PAGESIZE=$(grep "^pagesize" bootimg.cfg | cut -d'=' -f2)
          BASE=$(grep "^base" bootimg.cfg | cut -d'=' -f2)
          KERNEL_OFFSET=$(grep "^kernel_offset" bootimg.cfg | cut -d'=' -f2)
          RAMDISK_OFFSET=$(grep "^ramdisk_offset" bootimg.cfg | cut -d'=' -f2)
          TAGS_OFFSET=$(grep "^tags_offset" bootimg.cfg | cut -d'=' -f2)
          CMDLINE=$(grep "^cmdline" bootimg.cfg | cut -d'=' -f2-)
        fi

        BOOT_SIZE=${BOOT_SIZE:-0x04000000}
        PAGESIZE=${PAGESIZE:-4096}
        BASE=${BASE:-0x80000000}
        KERNEL_OFFSET=${KERNEL_OFFSET:-0x00008000}
        RAMDISK_OFFSET=${RAMDISK_OFFSET:-0x01000000}
        TAGS_OFFSET=${TAGS_OFFSET:-0x00000100}
        CMDLINE=${CMDLINE:-"androidboot.hardware=qcom androidboot.console=ttyMSM0 video=vfb:640x400,bpp=32,memsize=3072000 msm_rtb.filter=0x237 ehci-hcd.park=3 lpm_levels.sleep_disabled=1 service_locator.enable=1 swiotlb=2048 androidboot.configfs=true androidboot.usbcontroller=a600000.dwc3 firmware_class.path=/vendor/firmware_mnt/image loop.max_part=7 buildvariant=userdebug"}

        echo "Using parameters:"
        echo "  boot_size: $BOOT_SIZE"
        echo "  pagesize: $PAGESIZE"
        echo "  base: $BASE"
        echo "  kernel_offset: $KERNEL_OFFSET"
        echo "  ramdisk_offset: $RAMDISK_OFFSET"
        echo "  tags_offset: $TAGS_OFFSET"
        echo "  cmdline: $CMDLINE"

        # Create new bootimg.cfg with Sailfish-appropriate cmdline
        cat > bootimg.cfg << 'EOF'
bootsize = 0x04000000
pagesize = 4096
kernel_offset = 0x00008000
ramdisk_offset = 0x01000000
tags_offset = 0x00000100
cmdline = androidboot.hardware=qcom androidboot.console=ttyMSM0 video=vfb:640x400,bpp=32,memsize=3072000 msm_rtb.filter=0x237 ehci-hcd.park=3 lpm_levels.sleep_disabled=1 service_locator.enable=1 swiotlb=2048 androidboot.configfs=true androidboot.usbcontroller=a600000.dwc3 firmware_class.path=/vendor/firmware_mnt/image loop.max_part=7 buildvariant=userdebug
EOF

        # Repack with NEW kernel + HYBRIS ramdisk + original dtb
        abootimg --create ../hybris-boot.img \
          -f bootimg.cfg \
          -k zImage \
          -r initrd.img \
          -s dtb

        if [ ! -f "../hybris-boot.img" ]; then
          echo "ERROR: Failed to create hybris-boot.img"
          exit 1
        fi

        echo ""
        echo "=== SUCCESS: Created hybris-boot.img ==="
        ls -lh ../hybris-boot.img
        abootimg -i ../hybris-boot.img

    - name: Upload boot image
      uses: actions/upload-artifact@v4
      with:
        name: hybris-boot-fixed-${{ env.DEVICE }}-${{ env.RELEASE }}
        path: ${{ env.ANDROID_ROOT }}/hybris-boot.img
        retention-days: 30

    - name: Generate build summary
      run: |
        echo "## Build Summary - Fixed Ramdisk" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Device**: ${{ env.DEVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release**: ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel**: sdm845 (Docker enabled)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Key Fix Applied" >> $GITHUB_STEP_SUMMARY
        echo "**Previous Problem**: CI used Android's droid-boot.img ramdisk, which does NOT support Sailfish OS." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Fix Applied**: Use Sailfish OS hybris ramdisk instead of Android ramdisk." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Boot Image Components" >> $GITHUB_STEP_SUMMARY
        echo "1. **Kernel**: NEW (compiled with Docker support)" >> $GITHUB_STEP_SUMMARY
        echo "2. **Ramdisk**: NEW (Sailfish OS hybris ramdisk) <- THE FIX" >> $GITHUB_STEP_SUMMARY
        echo "3. **DTB**: Original (from Android droid-boot.img)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Flash Instructions" >> $GITHUB_STEP_SUMMARY
        echo "1. Download hybris-boot.img from artifacts" >> $GITHUB_STEP_SUMMARY
        echo "2. Boot to fastboot: \`adb reboot bootloader\`" >> $GITHUB_STEP_SUMMARY
        echo "3. Flash: \`fastboot flash boot hybris-boot.img\`" >> $GITHUB_STEP_SUMMARY
        echo "4. Reboot: \`fastboot reboot\`" >> $GITHUB_STEP_SUMMARY