name: Build Hybris Boot Image (Fixed)

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'fajita'
      release:
        description: 'SailfishOS release version'
        required: true
        default: '5.0.0.73'
  push:
    branches: [ main, master ]
    paths:
    - '.github/workflows/build-hybris-boot-new.yml'
    - 'scripts/apply-docker-kernel-patch-v2.sh'
    - 'scripts/minimal-clean-kernel-drivers.sh'
    - 'scripts/fix-camera-build.sh'
    - 'scripts/fix-camera-headers.sh'

env:
  DEVICE: ${{ github.event.inputs.device || 'fajita' }}
  RELEASE: ${{ github.event.inputs.release || '5.0.0.73' }}
  ANDROID_ROOT: /home/runner/work/android
  HYBRIS_BOOT_URL: https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/hybris-boot.img
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-hybris-boot:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          curl \
          unzip \
          build-essential \
          ccache \
          python3 \
          python3-pip \
          openjdk-8-jdk \
          rsync \
          bc \
          bison \
          flex \
          lib32ncurses-dev \
          lib32z1-dev \
          libssl-dev \
          libxml2-utils \
          xsltproc \
          zip \
          gcc-12-aarch64-linux-gnu \
          g++-12-aarch64-linux-gnu \
          gcc-12-arm-linux-gnueabihf \
          g++-12-arm-linux-gnueabihf \
          abootimg

    - name: Clear kernel cache and force fresh build
      run: |
        echo "Clearing kernel cache to ensure fresh build..."
        if [ -d "/home/runner/work/android/kernel" ]; then
          rm -rf /home/runner/work/android/kernel
          echo "Removed cached kernel directory"
        fi
        if [ -d ~/.ccache ]; then
          rm -rf ~/.ccache
          echo "Cleared ccache"
        fi

    - name: Clone kernel source
      env:
        GIT_TERMINAL_PROMPT: 0
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p $ANDROID_ROOT
        cd $ANDROID_ROOT

        if [ -d "kernel/oneplus/sdm845" ]; then
          echo "Removing existing kernel directory..."
          rm -rf kernel/oneplus/sdm845
        fi

        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git config --global credential.helper store
        echo "https://x-access-token:***@github.com" > ~/.git-credentials

        git clone --depth 1 --single-branch --branch lineage-16.0 \
          https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git \
          kernel/oneplus/sdm845

    - name: Apply kernel patches for Docker support
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        echo "Available defconfigs:"
        ls arch/arm64/configs/*_defconfig

        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Using defconfig: $DEFCONFIG"

        bash $GITHUB_WORKSPACE/scripts/apply-docker-kernel-patch-v2.sh

        tail -50 arch/arm64/configs/$DEFCONFIG

    - name: Build kernel
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc
        sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-12 /usr/bin/aarch64-linux-gnu-g++

        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=aarch64-linux-gnu-gcc
        export PATH=/usr/bin:$PATH

        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          echo "Error: No suitable defconfig found for fajita"
          exit 1
        fi

        echo "Building with defconfig: $DEFCONFIG"

        # Fix kernel compilation errors (minimal approach: patch headers, preserve drivers)
        bash $GITHUB_WORKSPACE/scripts/minimal-clean-kernel-drivers.sh $ANDROID_ROOT/kernel/oneplus/sdm845

        make $DEFCONFIG

        # Disable stack protector
        sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/CONFIG_CC_STACKPROTECTOR_STRONG=n/g' .config || true
        sed -i 's/CONFIG_CC_STACKPROTECTOR=y/CONFIG_CC_STACKPROTECTOR=n/g' .config || true
        sed -i 's/CONFIG_CC_STACKPROTECTOR_REGULAR=y/CONFIG_CC_STACKPROTECTOR_REGULAR=n/g' .config || true

        make -j$(nproc) Image.gz KCFLAGS="-Wno-error -fno-stack-protector -mcmodel=large" WERROR=0 HOSTCFLAGS="-Wno-error" 2>&1 | tee build.log || {
          echo "=== BUILD FAILED ==="
          tail -200 build.log
          grep -n "error:" build.log | tail -50 || true
          grep -n "No such file or directory" build.log | tail -30 || true
          grep -n "implicit declaration" build.log | tail -30 || true
          exit 1
        }

        if [ ! -f arch/arm64/boot/Image.gz ]; then
          echo "Error: Kernel image not found"
          exit 1
        fi

        ls -lh arch/arm64/boot/Image.gz

    - name: Download original hybris-boot.img
      run: |
        cd $ANDROID_ROOT
        mkdir -p hybris-boot-work
        cd hybris-boot-work

        echo "Downloading original hybris-boot.img from releases..."
        wget -O hybris-boot.img "$HYBRIS_BOOT_URL"

        ls -lh hybris-boot.img

    - name: Extract hybris-boot.img
      run: |
        cd $ANDROID_ROOT/hybris-boot-work

        echo "Extracting hybris-boot.img..."
        abootimg -x hybris-boot.img

        echo "Unpacked files:"
        ls -lh

        if [ -f bootimg.cfg ]; then
          echo "Boot configuration:"
          cat bootimg.cfg
        fi

    - name: Replace kernel in hybris-boot.img
      run: |
        cd $ANDROID_ROOT/hybris-boot-work

        # Copy new kernel
        echo "Copying new kernel..."
        cp $ANDROID_ROOT/kernel/oneplus/sdm845/arch/arm64/boot/Image.gz zImage

        ls -lh zImage initrd.img

    - name: Repack hybris-boot.img
      run: |
        cd $ANDROID_ROOT/hybris-boot-work

        echo "Repacking boot.img..."
        
        # Create new boot image with:
        # - new kernel (zImage)
        # - original hybris ramdisk (initrd.img) - THIS IS KEY!
        # - original bootimg.cfg settings
        # NOTE: Must use --create (not -u) to create a new boot image
        abootimg --create hybris-boot-new.img \
          -f bootimg.cfg \
          -k zImage \
          -r initrd.img

        ls -lh hybris-boot-new.img

        echo "Boot image info:"
        abootimg -i hybris-boot-new.img

    - name: Upload boot image artifact
      uses: actions/upload-artifact@v4
      with:
        name: hybris-boot-${{ env.DEVICE }}-${{ env.RELEASE }}
        path: ${{ env.ANDROID_ROOT }}/hybris-boot-work/hybris-boot-new.img
        retention-days: 30

    - name: Generate build summary
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        if [ -f arch/arm64/configs/fajita_defconfig ]; then
          DEFCONFIG=fajita_defconfig
        elif [ -f arch/arm64/configs/lineage_fajita_defconfig ]; then
          DEFCONFIG=lineage_fajita_defconfig
        elif [ -f arch/arm64/configs/sdm845_defconfig ]; then
          DEFCONFIG=sdm845_defconfig
        else
          DEFCONFIG="unknown"
        fi

        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Device**: ${{ env.DEVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release**: ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel**: sdm845" >> $GITHUB_STEP_SUMMARY
        echo "- **Defconfig**: $DEFCONFIG" >> $GITHUB_STEP_SUMMARY
        echo "- **Docker Support**: Enabled" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Key Fix" >> $GITHUB_STEP_SUMMARY
        echo "- **Base image**: hybris-boot.img (Sailfish OS ramdisk)" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel**: CI-compiled kernel with Docker support" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- hybris-boot-new.img (uses hybris ramdisk from official Sailfish OS)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Flash Instructions" >> $GITHUB_STEP_SUMMARY
        echo "1. Download hybris-boot-new.img from artifacts" >> $GITHUB_STEP_SUMMARY
        echo "2. Reboot to bootloader:" >> $GITHUB_STEP_SUMMARY
        echo " \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo " adb reboot bootloader" >> $GITHUB_STEP_SUMMARY
        echo " \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "3. Flash boot image:" >> $GITHUB_STEP_SUMMARY
        echo " \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo " fastboot flash boot hybris-boot-new.img" >> $GITHUB_STEP_SUMMARY
        echo " \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "4. Reboot:" >> $GITHUB_STEP_SUMMARY
        echo " \`\`\`" >> $GITHUB_STEP_SUMMARY
        echo " fastboot reboot" >> $GITHUB_STEP_SUMMARY
        echo " \`\`\`" >> $GITHUB_STEP_SUMMARY